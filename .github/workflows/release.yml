name: Release

# Tag-driven release. Mirrors scripts/release.ps1 for when GitHub Actions are
# enabled (Lewis's default is local releases via that script). Push a v*.*.* tag.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Velopack delta generation reads git history for the previous release.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test NavNames.Tests/NavNames.Tests.csproj --configuration Release

      - name: Install Velopack CLI
        # Pin to match the Velopack library version in NavNames.csproj (no skew).
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download previous release for delta generation
        # First-ever release has nothing to download, hence continue-on-error.
        run: |
          vpk download github `
            --repoUrl https://github.com/LewisIsWorking/NavNames `
            --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Compute Velopack package version
        # Velopack requires semver2 with no 'v' prefix (v0.2.0 -> 0.2.0).
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Packaging version: $version"

      - name: Publish for Velopack packaging
        # Multi-file (PublishSingleFile=false) + self-contained, as Velopack needs.
        run: |
          dotnet publish NavNames/NavNames.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish `
            -p:PublishSingleFile=false

      - name: Pack with Velopack
        run: |
          vpk pack `
            --packId NavNames `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir publish `
            --mainExe NavNames.exe `
            --packTitle "NavNames" `
            --shortcuts "Desktop,StartMenu"

      - name: Upload to GitHub Releases
        run: |
          vpk upload github `
            --repoUrl https://github.com/LewisIsWorking/NavNames `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --publish `
            --releaseName "NavNames ${{ github.ref_name }}" `
            --tag ${{ github.ref_name }}
